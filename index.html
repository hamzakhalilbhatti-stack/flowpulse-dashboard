<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HKB Automations</title>
<meta name="theme-color" content="#060708"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#060708;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'Segoe UI',sans-serif;color:#f1f3f6}
.wrap{display:flex;flex-direction:column;align-items:center;gap:16px;animation:fade .4s ease}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.mark{width:52px;height:52px;border-radius:14px;background:linear-gradient(135deg,#7c3aed,#38bdf8);display:flex;align-items:center;justify-content:center;font-size:26px;animation:breathe 1.8s ease-in-out infinite}
@keyframes breathe{0%,100%{box-shadow:0 0 20px rgba(124,58,237,.3)}50%{box-shadow:0 0 45px rgba(124,58,237,.55)}}
.txt{font-size:13px;color:#5a6270;letter-spacing:.3px}
</style>
</head>
<body>
<div class="wrap">
  <div class="mark">⚡</div>
  <div class="txt" id="msg">Checking authentication…</div>
</div>
<script>
const SUPABASE_URL  = 'https://haszbfvjlxkwrrqfgqum.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhhc3piZnZqbHhrd3JycWZncXVtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5OTgxMzEsImV4cCI6MjA4ODU3NDEzMX0.-60WLt-U37aext9eKlOhnYbH0fuHmexIdLMzMvyZMjs';

(async()=>{
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
  const{data:{session}} = await sb.auth.getSession();

  if(!session?.user){
    // Not logged in → send to agency login page
    window.location.replace('app.html');
    return;
  }

  // Logged in — check role
  const{data:profile} = await sb.from('profiles').select('role').eq('id',session.user.id).single();

  if(profile?.role === 'client'){
    document.getElementById('msg').textContent = 'Redirecting to your dashboard…';
    window.location.replace('client.html');
  } else {
    document.getElementById('msg').textContent = 'Redirecting to agency dashboard…';
    window.location.replace('app.html');
  }
})();
</script>
</body>
</html>
