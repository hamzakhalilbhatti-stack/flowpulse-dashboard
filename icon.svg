<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0b0d10"/>
      <stop offset="100%" style="stop-color:#171b21"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Subtle border -->
  <rect width="512" height="512" rx="112" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="2"/>
  <!-- Glow orb -->
  <circle cx="256" cy="256" r="160" fill="rgba(0,212,255,0.04)"/>
  <!-- Lightning bolt -->
  <path d="M300 80 L180 280 L240 280 L212 432 L332 220 L268 220 L300 80Z"
        fill="url(#bolt)" filter="url(#glow)" opacity="0.95"/>
  <!-- Inner highlight -->
  <path d="M300 80 L180 280 L240 280 L212 432 L332 220 L268 220 L300 80Z"
        fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
</svg>
